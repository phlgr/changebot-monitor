name: Check
on:
    push:
        branches: ["main"]
    pull_request:
jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run knip
