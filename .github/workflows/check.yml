name: Check
on:
    push:
        branches: ["main"]
    pull_request:
jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
            - run: bun install --frozen-lockfile
            - run: bun run lint
            - run: bun run knip
